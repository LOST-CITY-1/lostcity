<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المؤسسين</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.container {
  padding-top: 80px;
}

h1 {
  font-size: 50px;
  margin-bottom: 40px;
}

.card {
  background: #1a1a1a;
  width: 300px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #333;
}

.name {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #fff;
}

.role {
  color: #aaa;
  font-size: 16px;
}

.back {
  display: inline-block;
  margin-top: 40px;
  padding: 10px 20px;
  color: white;
  text-decoration: none;
  border: 1px solid #444;
  border-radius: 10px;
  transition: 0.3s;
}

.back:hover {
  background: white;
  color: black;
}
</style>

</head>

<body>

<div class="container">

  <h1>👑 المؤسسين</h1>

  <div class="card">
    <div class="name">أبو جنتل</div>
    <div class="role">صاحب السيرفر</div>
  </div>

  <a class="back" href="index.html">رجوع للرئيسية</a>

</div>

</body>
</html>
