<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المؤسسين</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;

  /* 🔥 خلفية بنفسجية احترافية */
  background: radial-gradient(circle at top, #2b0a3d, #0b0b0f);
}

/* العنوان */
h1 {
  font-size: 55px;
  margin-top: 60px;
  color: #c77dff;
  text-shadow: 0 0 15px #9d4edd;
}

/* الكرت */
.card {
  width: 320px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;

  /* تأثير زجاجي */
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(199,125,255,0.4);
  box-shadow: 0 0 25px rgba(157,78,221,0.4);
  backdrop-filter: blur(10px);
}

.name {
  font-size: 26px;
  font-weight: bold;
  color: #fff;
}

.role {
  margin-top: 10px;
  color: #c77dff;
}

/* زر الرجوع */
a {
  display: inline-block;
  margin-top: 40px;
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  border: 1px solid #9d4edd;
  transition: 0.3s;
}

a:hover {
  background: #9d4edd;
  box-shadow: 0 0 20px #9d4edd;
}
</style>

</head>

<body>

<h1>👑 المؤسسين</h1>

<div class="card">
  <div class="name">أبو جنتل</div>
  <div class="role">صاحب السيرفر</div>
</div>

<a href="index.html">رجوع للرئيسية</a>

</body>
</html>
