  text-decoration: none;

}

nav a:hover {
  background: white;
  color: black;
}

/* الهيرو */
.hero {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;

.hero h1 {
  font-size: 60px;
  margin: 0;
}

.hero p {
  color: #aaa;
  margin-top: 10px;
  font-size: 18px;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: white;
  color: black;
  text-decoration: none;
  border-radius: 10px;
}
</style>

</head>
