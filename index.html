<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #07070a;
  color: white;
  overflow: hidden;
}

/* LC الكبير */
.lc {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 200px;
  font-weight: 900;
  color: rgba(157,78,221,0.12);
  letter-spacing: 20px;
  text-shadow: 0 0 60px rgba(157,78,221,0.2);
  pointer-events: none;
}

/* المدينة */
.city {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 60%;
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  opacity: 0.5;
}

.building {
  width: 60px;
  background: #1a1a1a;
  border: 1px solid #222;
  box-shadow: 0 0 20px #9d4edd33;
}

.b1 { height: 120px; }
.b2 { height: 180px; }
.b3 { height: 90px; }
.b4 { height: 200px; }
.b5 { height: 150px; }

/* المحتوى */
.content {
  position: relative;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  font-size: 60px;
  color: #c77dff;
  text-shadow: 0 0 20px #9d4edd;
  margin: 0;
}

p {
  color: #aaa;
}

/* الأزرار */
.btns {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.btn {
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  border: 1px solid #9d4edd;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}

.btn:hover {
  background: #9d4edd;
  box-shadow: 0 0 20px #9d4edd;
}

/* زر الديسكورد */
.discord {
  margin-top: 25px;
  padding: 14px 30px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: #5865F2;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(88,101,242,0.5);
}

.discord:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(88,101,242,0.8);
}
</style>

</head>

<body>

<!-- LC -->
<div class="lc">LC</div>

<!-- المدينة -->
<div class="city">
  <div class="building b1"></div>
  <div class="building b3"></div>
  <div class="building b5"></div>
  <div class="building b2"></div>
  <div class="building b4"></div>
</div>

<!-- المحتوى -->
<div class="content">

  <h1>Lost City</h1>
  <p>سيرفر رول بلاي احترافي</p>

  <div class="btns">
    <a class="btn" href="rules.html">القوانين</a>
    <a class="btn" href="founders.html">المؤسسين</a>
  </div>

  <!-- ديسكورد -->
  <a class="discord" href="https://discord.gg/dZSnqcRQCp" target="_blank">
    دخول الديسكورد
  </a>

</div>

</body>
</html>
