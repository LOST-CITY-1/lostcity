<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* طبقة تغميق */
.overlay {
  background: rgba(0,0,0,0.7);
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* العنوان */
h1 {
  font-size: 50px;
  margin-bottom: 20px;
}

/* الأزرار */
.buttons {
  display: flex;
  gap: 15px;
}

.btn {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  padding: 15px 30px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #00c6ff;
}

/* المؤسسين */
.founders {
  position: absolute;
  bottom: 20px;
  text-align: center;
}

.founders h2 {
  margin-bottom: 5px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 10px 20px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="overlay">

  <h1>🔥 Lost City 🔥</h1>

  <div class="buttons">
    <a href="rules.html" class="btn">📜 القوانين</a>
    <a href="#" class="btn">🎮 دخول السيرفر</a>
  </div>

  <div class="founders">
    <h2>👑 المؤسسين</h2>
    <div class="card">
      ابو جنتل <br>
      <small>صاحب السيرفر</small>
    </div>
  </div>

</div>

</body>
</html>
