<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial;
  color: white;
}

/* الواجهة */
.screen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* العنوان */
.title {
  font-size: 70px;
  margin-bottom: 40px;
}

/* الروابط (مكان "القوانين" داخل التصميم) */
.menu {
  display: flex;
  gap: 60px;
  font-size: 25px;
}

/* نفس شكل UI */
.menu a {
  color: white;
  text-decoration: none;
  padding: 10px 20px;
  border: 1px solid #444;
  border-radius: 10px;
  transition: 0.3s;
}

.menu a:hover {
  background: white;
  color: black;
}
</style>

</head>

<body>

<div class="screen">

  <div class="title">Lost City</div>

  <div class="menu">
    <a href="index.html">الرئيسية</a>
    <a href="rules.html">القوانين</a>
    <a href="founders.html">المؤسسين</a>
  </div>

</div>

</body>
</html>
