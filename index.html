<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #2b0a3d, #0b0b0f);
  color: white;
}

/* الهيدر */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: #120a1a;
  border-bottom: 1px solid #3a0a55;
}

.logo {
  font-size: 22px;
  color: #c77dff;
  font-weight: bold;
}

/* الروابط */
nav a {
  margin: 0 10px;
  text-decoration: none;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
}

nav a:hover {
  background: #9d4edd;
}

/* منتصف الصفحة */
.hero {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 70px;
  color: #c77dff;
  text-shadow: 0 0 20px #9d4edd;
}

.hero p {
  color: #aaa;
}

/* زر */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: #9d4edd;
  color: white;
  text-decoration: none;
  border-radius: 10px;
}

.btn:hover {
  box-shadow: 0 0 20px #9d4edd;
}
</style>

</head>

<body>

<header>
  <div class="logo">Lost City</div>

  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="rules.html">القوانين</a>
    <a href="founders.html">المؤسسين</a>
  </nav>
</header>

<div class="hero">
  <h1>Lost City</h1>
  <p>سيرفر رول بلاي احترافي</p>
  <a class="btn" href="rules.html">دخول</a>
</div>

</body>
</html>
