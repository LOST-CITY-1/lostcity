<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
}

/* حاوية الصورة */
.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* الصورة الأساسية */
.container img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* أزرار فوق الصورة */
.btn {
  position: absolute;
  padding: 12px 20px;
  background: rgba(0,0,0,0.6);
  border: 1px solid white;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}

/* مكان الأزرار (عدّلها حسب الصورة عندك) */
.rules {
  top: 40%;
  left: 20%;
}

.founders {
  top: 40%;
  left: 60%;
}

.home {
  top: 10%;
  left: 45%;
}
</style>

</head>

<body>

<div class="container">

  <!-- 🔥 حط صورتك هنا -->
  <img src="images.png" alt="design">

  <!-- أزرار التنقل فوق الصورة -->
  <a class="btn home" href="index.html">الرئيسية</a>
  <a class="btn rules" href="rules.html">القوانين</a>
  <a class="btn founders" href="founders.html">المؤسسين</a>

</div>

</body>
</html>
