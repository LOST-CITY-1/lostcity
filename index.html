<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #2b0a3d, #07070a);
  color: white;
  overflow: hidden;
}

/* تأثير ضوء بنفسجي بالخلف */
.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: #9d4edd;
  filter: blur(200px);
  opacity: 0.25;
  top: -100px;
  left: -100px;
}

/* LC */
.lc {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 220px;
  font-weight: 900;
  color: rgba(199,125,255,0.12);
  letter-spacing: 25px;
  text-shadow: 0 0 80px rgba(157,78,221,0.3);
  pointer-events: none;
}

/* المدينة */
.city {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 60%;
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  opacity: 0.6;
}

.building {
  width: 60px;
  background: linear-gradient(to top, #1a1a1a, #2b0a3d);
  border: 1px solid #3a0a55;
  box-shadow: 0 0 30px rgba(157,78,221,0.2);
}

.b1 { height: 120px; }
.b2 { height: 180px; }
.b3 { height: 90px; }
.b4 { height: 220px; }
.b5 { height: 150px; }

/* المحتوى */
.content {
  position: relative;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 65px;
  color: #c77dff;
  text-shadow: 0 0 25px #9d4edd;
  margin: 0;
}

p {
  color: #bbb;
}

/* أزرار */
.btns {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.btn {
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  border: 1px solid #9d4edd;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}

.btn:hover {
  background: #9d4edd;
  box-shadow: 0 0 25px #9d4edd;
  transform: translateY(-2px);
}

/* ديسكورد */
.discord {
  margin-top: 25px;
  padding: 14px 30px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: #5865F2;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 25px rgba(88,101,242,0.6);
}

.discord:hover {
  transform: scale(1.05);
  box-shadow: 0 0 35px rgba(88,101,242,0.9);
}

/* تيك توك */
.tiktok {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: black;
  border: 1px solid #c77dff;
  box-shadow: 0 0 20px rgba(199,125,255,0.3);
  transition: 0.3s;
}

.tiktok:hover {
  box-shadow: 0 0 30px rgba(199,125,255,0.6);
  transform: scale(1.05);
}
</style>

</head>

<body>

<!-- ضوء بنفسجي -->
<div class="glow"></div>

<!-- LC -->
<div class="lc">LC</div>

<!-- المدينة -->
<div class="city">
  <div class="building b1"></div>
  <div class="building b3"></div>
  <div class="building b5"></div>
  <div class="building b2"></div>
  <div class="building b4"></div>
</div>

<!-- المحتوى -->
<div class="content">

  <h1>Lost City</h1>
  <p>سيرفر رول بلاي احترافي</p>

  <div class="btns">
    <a class="btn" href="rules.html">القوانين</a>
    <a class="btn" href="founders.html">المؤسسين</a>
  </div>

  <!-- ديسكورد -->
  <a class="discord" href="https://discord.gg/dZSnqcRQCp" target="_blank">
  🎮 انضم للديسكورد
</a>
</a>
  </a>

  <!-- تيك توك -->
<a class="tiktok" href="https://www.tiktok.com/@lc9721" target="_blank">
  🎵 تابعنا TikTok
</a>
 
  </a>

</div>

</body>
</html>
