<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City RP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at center, #0f172a, #020617);
    color: white;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
}

.logo {
    color: #a855f7;
    font-weight: bold;
    font-size: 20px;
}

.nav-links a {
    color: #ccc;
    margin: 0 15px;
    text-decoration: none;
}

.nav-links a:hover {
    color: #a855f7;
}

.join-btn {
    background: linear-gradient(45deg, #9333ea, #a855f7);
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
}

/* Hero */
.hero {
    text-align: center;
    margin-top: 120px;
}

.hero h1 {
    font-size: 60px;
    color: #c084fc;
}

.hero p {
    color: #94a3b8;
}

.buttons {
    margin-top: 30px;
}

.btn {
    padding: 15px 30px;
    margin: 10px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

.primary {
    background: linear-gradient(45deg, #9333ea, #c084fc);
    color: white;
}

.secondary {
    border: 1px solid #a855f7;
    color: #a855f7;
}
</style>

</head>
<body>

<nav>
<div class="logo">Lost City</div>

<div class="nav-links">
<a href="#">الرئيسية</a>
<a href="rules.html">القوانين</a>
</div>

<a class="join-btn" href="https://discord.gg/CxpaxTspUF" target="_blank">
انضم الآن
</a>
</nav>

<div class="hero">
<h1>Lost City</h1>
<p>أفضل سيرفر حياة واقعية 🔥</p>

<div class="buttons">
<a class="btn primary" href="https://discord.gg/CxpaxTspUF" target="_blank">
انضم للسيرفر
</a>

<a class="btn secondary" href="rules.html">
قراءة القوانين
</a>
</div>
</div>

</body>
</html>
