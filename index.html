<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* تغبيش + فخامة */
.overlay {
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.9));
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* شعار */
.logo {
  width: 140px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 15px purple);
}

/* العنوان */
h1 {
  font-size: 55px;
  margin-bottom: 25px;
  text-shadow: 0 0 20px #6a00ff;
}

/* الأزرار */
.buttons {
  display: flex;
  gap: 20px;
}

.btn {
  background: linear-gradient(45deg, #6a00ff, #00c6ff);
  padding: 15px 35px;
  border-radius: 15px;
  text-decoration: none;
  color: white;
  font-size: 20px;
  transition: 0.3s;
  box-shadow: 0 0 15px #6a00ff;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #00c6ff;
}
</style>

</head>

<body>

<div class="overlay">

  <img src="logo.png" class="logo">

  <h1>Lost City</h1>

  <div class="buttons">
    <a href="rules.html" class="btn">📜 القوانين</a>
    <a href="founders.html" class="btn">👑 المؤسسين</a>
  </div>

</div>

</body>
</html>
