<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {body {
  background-image: url("images/lost-city.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
  margin: 0;
  font-family: Arial;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* طبقة فخمة */
.overlay {
  background: rgba(0,0,0,0.75);
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* العنوان */
h1 {
  color: white;
  font-size: 60px;
  margin-bottom: 30px;
  text-shadow: 0 0 20px purple;
}

/* الأزرار */
.menu {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 250px;
}

.btn {
  text-align: center;
  padding: 15px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 20px;

  background: linear-gradient(45deg, #6a00ff, #00c6ff);
  box-shadow: 0 0 15px #6a00ff;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #00c6ff;
}
</style>

</head>

<body>

<div class="overlay">

  <h1>Lost City</h1>

  <div class="menu">
    <a href="rules.html" class="btn">📜 القوانين</a>
    <a href="founders.html" class="btn">👑 المؤسسين</a>
  </div>

</div>

</body>
</html>
