<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lost City</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0f;
  color: white;
  overflow: hidden;
}

/* كلمة الخلفية الكبيرة */
.bg-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 140px;
  font-weight: 900;
  letter-spacing: 10px;
  color: rgba(157,78,221,0.15);
  text-shadow: 0 0 40px rgba(157,78,221,0.2);
  pointer-events: none;
}

/* المحتوى */
.content {
  position: relative;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* العنوان الأساسي */
h1 {
  font-size: 60px;
  color: #c77dff;
  text-shadow: 0 0 20px #9d4edd;
  margin-bottom: 10px;
}

p {
  color: #aaa;
  margin-bottom: 30px;
}

/* الأزرار */
.btns {
  display: flex;
  gap: 20px;
}

.btn {
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  border: 1px solid #9d4edd;
  transition: 0.3s;
  background: rgba(255,255,255,0.05);
}

.btn:hover {
  background: #9d4edd;
  box-shadow: 0 0 20px #9d4edd;
}
</style>

</head>

<body>

<!-- خلفية النص الكبير -->
<div class="bg-text">LOST CITY</div>

<div class="content">

  <h1>Lost City</h1>
  <p>سيرفر رول بلاي احترافي</p>

  <div class="btns">
    <a class="btn" href="rules.html">القوانين</a>
    <a class="btn" href="founders.html">المؤسسين</a>
  </div>

</div>

</body>
</html>
